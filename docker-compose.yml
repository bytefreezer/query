version: '3.8'

services:
  query:
    build: .
    ports:
      - "8000:8000"
    environment:
      - BYTEFREEZER_QUERY_SERVER_PORT=${BYTEFREEZER_QUERY_SERVER_PORT:-8000}
      - BYTEFREEZER_QUERY_S3_REGION=${BYTEFREEZER_QUERY_S3_REGION:-us-west-2}
      - BYTEFREEZER_QUERY_S3_ACCESS_KEY=${BYTEFREEZER_QUERY_S3_ACCESS_KEY}
      - BYTEFREEZER_QUERY_S3_SECRET_KEY=${BYTEFREEZER_QUERY_S3_SECRET_KEY}
      - BYTEFREEZER_QUERY_S3_ENDPOINT=${BYTEFREEZER_QUERY_S3_ENDPOINT:-}
      - BYTEFREEZER_QUERY_S3_BUCKET=${BYTEFREEZER_QUERY_S3_BUCKET}
      - BYTEFREEZER_QUERY_S3_DATA_PATH=${BYTEFREEZER_QUERY_S3_DATA_PATH:-data/}
      - BYTEFREEZER_QUERY_S3_SSL=${BYTEFREEZER_QUERY_S3_SSL:-true}
      - BYTEFREEZER_QUERY_S3_URL_STYLE=${BYTEFREEZER_QUERY_S3_URL_STYLE:-vhost}
      - BYTEFREEZER_QUERY_LLM_PROVIDER=${BYTEFREEZER_QUERY_LLM_PROVIDER:-anthropic}
      - BYTEFREEZER_QUERY_LLM_API_KEY=${BYTEFREEZER_QUERY_LLM_API_KEY}
      - BYTEFREEZER_QUERY_LLM_MODEL=${BYTEFREEZER_QUERY_LLM_MODEL:-claude-sonnet-4-20250514}
      - BYTEFREEZER_QUERY_LLM_OLLAMA_HOST=${BYTEFREEZER_QUERY_LLM_OLLAMA_HOST:-http://host.docker.internal:11434}
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./ui:/app/ui:ro
      - ./prompts:/app/prompts:ro
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
