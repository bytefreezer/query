# Local development configuration (synced with demo)
app:
  name: bytefreezer-query
  version: 1.0.0

logging:
  level: debug
  encoding: console

server:
  port: 8000

# Control API - gets datasets and S3 credentials from control service
control:
  url: http://192.168.86.103:8082
  api_key: "REPLACE_WITH_AWX_VARIABLE_bytefreezer_api_key"

# S3 credentials are obtained per-dataset from control API
# No static S3 configuration needed

llm:
  provider: anthropic
  api_key: "REPLACE_WITH_AWX_VARIABLE_claude_api_key"
  model: claude-sonnet-4-20250514

limits:
  max_time_range_hours: 24
  max_row_limit: 100
  allow_order_by: false
